<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgneticAnalysis Dashboard</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">AgneticAnalysis</p>
          <h1>Pipeline Control Room</h1>
          <p class="lede">
            Daily institutional research runs, raw broker and market artifacts, and authored agent reports from the Postgres pipeline store.
          </p>
        </div>
        <button id="refreshButton" class="ghost-button" type="button">Refresh</button>
      </header>

      <main class="dashboard-grid">
        <section class="panel metrics-panel">
          <h2>Overview</h2>
          <div id="metricsGrid" class="metrics-grid"></div>
        </section>

        <section class="panel runs-panel">
          <div class="panel-header">
            <h2>Recent Runs</h2>
            <span id="runsMeta" class="muted-text"></span>
          </div>
          <div id="runsList" class="runs-list"></div>
        </section>

        <section class="panel detail-panel">
          <div class="panel-header">
            <h2>Run Detail</h2>
            <span id="selectedRunMeta" class="muted-text"></span>
          </div>
          <div id="runSummary" class="summary-block"></div>
          <div class="detail-columns">
            <div>
              <h3>Final Reports</h3>
              <div id="finalReports" class="report-list"></div>
            </div>
            <div>
              <h3>Agent Outputs</h3>
              <div id="agentOutputs" class="report-list"></div>
            </div>
          </div>
          <div>
            <h3>Artifacts</h3>
            <div id="artifacts" class="artifact-list"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
