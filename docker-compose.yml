services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: agnetic
      POSTGRES_PASSWORD: agnetic
      POSTGRES_DB: agneticanalysis
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agnetic -d agneticanalysis"]
      interval: 5s
      timeout: 5s
      retries: 20

  scheduler:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://agnetic:agnetic@postgres:5432/agneticanalysis
    command: sh -c "node src/db/wait_for_db.js && node src/db/init_db.js && npm run scheduler"

volumes:
  postgres_data:
